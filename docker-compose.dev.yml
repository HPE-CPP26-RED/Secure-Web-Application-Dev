###############################################################################
# docker-compose.prod.yml — Production Orchestration (PERN-Store)
#
# Zone Model (PRD v2.0 §9.1):
#   Web Zone (DMZ)  → nginx      — frontend-net only
#   App Zone        → api        — frontend-net + backend-net (bridge)
#   Data Zone       → postgres   — backend-net only
#
# Network Segmentation:
#   frontend-net:  nginx ↔ api
#   backend-net:   api   ↔ postgres
#   nginx  CANNOT reach postgres  (no shared network)
#   postgres CANNOT reach nginx   (no shared network)
#
# SECURITY:
#   • No secrets are hardcoded — all come from .env.production
#   • Only nginx exposes host ports (80, 443)
#   • Internal services have NO host port mappings
#   • Containers run with read-only root FS where possible
#   • Restart policies enforce availability
###############################################################################

version: "3.8"

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # WEB ZONE (DMZ) — Nginx Reverse Proxy & Static Server
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: pern-prod-nginx
    restart: unless-stopped
    ports:
      # TESTING: Accept connections from remote machines
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      # Hardened Nginx configuration
      - ./server/config/nginx.conf:/etc/nginx/nginx.conf:ro
      # React production build (pre-built via CI/CD or client Dockerfile)
      - ./client/dist:/var/www/html:ro
      # TLS certificates (mount your certs here)
      # - ./certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      # - ./certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    networks:
      - frontend-net
    # nginx MUST NOT be on backend-net — enforces Web→Data isolation
    depends_on:
      api:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=10M
      - /var/run:size=1M
      - /tmp:size=5M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION ZONE — Node.js API Server
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    image: pern-store-api-prod
    container_name: pern-prod-api
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=9000
      - POSTGRES_USER=postgres
      - POSTGRES_DB=pernstore
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_SSL=false
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      # ⚠️ AWS DEPLOYMENT: Update this to your actual EC2 public IP or domain
      - ALLOWED_ORIGINS=http://13.126.117.114,http://localhost,http://172.22.128.1
      # ⚠️ AWS DEPLOYMENT: Update this to your actual EC2 public IP or domain
      - CLIENT_URL=http://13.126.117.114:80
      - SMTP_FROM="Vantage Support <kamatharavind28@gmail.com>"
      - SMTP_USER=kamatharavind28@gmail.com
      - LOG_LEVEL=info
    # TESTING: Expose API directly for security testing from remote machines
    ports:
      - "0.0.0.0:9000:9000"
    expose:
      - "9000"
    networks:
      - frontend-net #Allows nginx → api communication
      - backend-net #Allows api → postgres communication
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');const r=http.get(''http://localhost:9000/'',res=>{process.exit(res.statusCode===200?0:1)});r.on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════
  # DATA ZONE — PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: pern-prod-db
    restart: unless-stopped
    env_file:
      - ./server/.env
    # For local testing, expose PostgreSQL to host
    # In production, remove 'ports' and keep only 'expose'
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./server/config/init-test.sh:/docker-entrypoint-initdb.d/02-init-test.sh:ro
    networks:
      - backend-net
    # postgres MUST NOT be on frontend-net — enforces App→Data isolation
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      # Bind only to internal Docker network interface (not 0.0.0.0)
      - "-c"
      - "listen_addresses=*"
      # Connection limits
      - "-c"
      - "max_connections=100"
      # Logging
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_statement=ddl"

  # ═══════════════════════════════════════════════════════════════════════════
  # DATA ZONE — Adminer (Local DB GUI)
  # ═══════════════════════════════════════════════════════════════════════════
  adminer:
    image: adminer:latest
    container_name: pern-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend-net
      - adminer-net

# ═════════════════════════════════════════════════════════════════════════════
# NETWORK SEGMENTATION — Two Isolated Bridge Networks
# ═════════════════════════════════════════════════════════════════════════════
networks:
  # frontend-net: nginx ↔ api ONLY
  frontend-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-frontend
    internal: false # nginx needs external access for inbound traffic

  # backend-net: api ↔ postgres ONLY
  backend-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-backend
    internal: true # No external access — fully isolated

  # adminer-net: host ↔ adminer ONLY
  adminer-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-adminer
    internal: false

# ═════════════════════════════════════════════════════════════════════════════
# PERSISTENT VOLUMES
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  pgdata:
    driver: local
