###############################################################################
# nginx.dev.conf — Local Development Nginx Configuration (PERN-Store)
#
# HTTP only (no SSL) — for local development and security testing
# Production config: nginx.conf (requires Let's Encrypt certs)
###############################################################################

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # ── Upstream: Node.js API ─────────────────────────────────────────────────
    upstream api_backend {
        server api:9000;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTP Server — Development (no SSL, serves on port 80)
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name localhost _;

        root /var/www/html;
        index index.html;

        # ── Security Headers (same as production) ────────────────────────────
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com https://accounts.google.com; frame-src https://api.razorpay.com https://checkout.razorpay.com; connect-src 'self' https://api.razorpay.com https://cdn.razorpay.com https://lumberjack.razorpay.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

        # ── Health Check ─────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Reverse Proxy: /api → Node.js API ────────────────────────────────
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_hide_header X-Powered-By;
        }

        # ── Static Files: React SPA ──────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 1d;
                add_header Cache-Control "public";
                access_log off;
            }
        }

        # ── Block Hidden Files ───────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
