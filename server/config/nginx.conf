###############################################################################
# nginx.conf — Hardened Production Nginx Configuration (PERN-Store)
#
# Responsibilities:
#   1. Serve React static build from /var/www/html
#   2. Reverse proxy /api/* requests to Node.js API (api:9000)
#   3. Enforce security headers and rate limiting
#   4. Basic DDoS / brute-force mitigation
#
# Zone: Web Zone (DMZ) — the ONLY externally accessible service
###############################################################################

# ── Global Settings ──────────────────────────────────────────────────────────
# Run as non-root user
user  nginx;
worker_processes  auto;
worker_rlimit_nofile 8192;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging Format ───────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Security: Hide Nginx version ─────────────────────────────────────────
    server_tokens off;

    # ── Rate Limiting Zones ──────────────────────────────────────────────────
    # General: 10 requests/sec per IP with burst of 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # API-specific: 5 requests/sec per IP with burst of 10
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # Auth endpoints: 2 requests/sec per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream: Node.js API ────────────────────────────────────────────────
    upstream api_backend {
        server api:9000;
        keepalive 32;
    }

    # ═════════════════════════════════════════════════════════════════════════
    # HTTP Server — Strict redirect to HTTPS
    # ═════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name vantagestore.me www.vantagestore.me;

        return 301 https://$host$request_uri;
    }

    # ═════════════════════════════════════════════════════════════════════════
    # HTTPS Server — TLS termination via Let's Encrypt
    # ═════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name vantagestore.me www.vantagestore.me;

        root /var/www/html;
        index index.html;

        # ── TLS Configuration ──────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/vantagestore.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vantagestore.me/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Connection Limits ───────────────────────────────────────────────
        limit_conn addr 50;

        # ── Global Security Headers ─────────────────────────────────────────
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://accounts.google.com; frame-src 'self' https://checkout.razorpay.com https://accounts.google.com https://api.razorpay.com; connect-src 'self' https://api.razorpay.com; upgrade-insecure-requests;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # ── Health Check Endpoint (for Docker healthcheck) ──────────────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Reverse Proxy: /api → Node.js API ──────────────────────────────
        # Auth endpoints with stricter rate limiting (explicit /api/auth/ path)
        location ~ ^/api/auth/(login|signup|register) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Origin $http_origin;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Don't pass server header from upstream
            proxy_hide_header X-Powered-By;
        }

        # All other API routes
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Origin $http_origin;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Don't pass server header from upstream
            proxy_hide_header X-Powered-By;
        }

        # ── Static Files: React SPA ─────────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ── Block Hidden Files ──────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Block Common Attack Vectors ─────────────────────────────────────
        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ {
            deny all;
            log_not_found off;
        }

        # Deny access to sensitive files
        location ~* (\.env|\.git|docker-compose|Dockerfile) {
            deny all;
            log_not_found off;
        }

        # ── Custom Error Pages ──────────────────────────────────────────────
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
