# ── Nginx Reverse Proxy Configuration ─────────────────────────────────────────
# PERN-Store: Node.js API + Vite SPA
#
# Upstream: http://127.0.0.1:9000 (Express)
# Static:  /var/www/pern-store/client (Vite build output)
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zone (complement Express rate-limiter) ─────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream pern_api {
    server 127.0.0.1:9000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect (enable after certbot) ────────────────────────────
# server {
#     listen 80;
#     listen [::]:80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ───────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── After certbot, replace the above with: ──────────────────────────────
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # server_name yourdomain.com www.yourdomain.com;
    #
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Security Headers (complement Helmet) ────────────────────────────────
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://checkout.razorpay.com https://accounts.google.com/gsi/client; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://lumberjack.razorpay.com https://accounts.google.com; frame-src https://api.razorpay.com https://accounts.google.com; object-src 'none';" always;

    # ── Hide Nginx version ──────────────────────────────────────────────────
    server_tokens off;

    # ── Client body size limit ──────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Serve Vite SPA (client build) ───────────────────────────────────────
    root /var/www/pern-store/client;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API proxy ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://pern_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Auth endpoints — stricter rate limit ────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://pern_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Block dotfiles (except .well-known for certbot) ─────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # ── Error pages ─────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
